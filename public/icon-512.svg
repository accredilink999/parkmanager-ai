<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#059669"/>
      <stop offset="100%" style="stop-color:#0d9488"/>
    </linearGradient>
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#065f46" stop-opacity="0.3"/>
      <stop offset="100%" style="stop-color:#059669" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="102" fill="url(#bg)"/>
  <!-- Subtle sky gradient -->
  <rect x="40" y="40" width="432" height="280" rx="20" fill="url(#sky)"/>
  <!-- Hills in background -->
  <ellipse cx="160" cy="240" rx="120" ry="40" fill="white" opacity="0.08"/>
  <ellipse cx="380" cy="250" rx="100" ry="30" fill="white" opacity="0.06"/>
  <!-- Trees -->
  <polygon points="400,180 414,230 386,230" fill="white" opacity="0.15"/>
  <polygon points="420,190 432,230 408,230" fill="white" opacity="0.12"/>
  <polygon points="110,190 122,230 98,230" fill="white" opacity="0.12"/>
  <!-- Caravan body -->
  <rect x="70" y="160" width="290" height="150" rx="22" fill="white" opacity="0.95"/>
  <!-- Caravan roof curve -->
  <path d="M70 182 Q70 130 110 130 L320 130 Q360 130 360 182" fill="white" opacity="0.95"/>
  <!-- Stripe detail on body -->
  <rect x="70" y="235" width="290" height="6" rx="3" fill="#059669" opacity="0.2"/>
  <!-- Windows -->
  <rect x="100" y="148" width="72" height="56" rx="10" fill="#059669" opacity="0.5"/>
  <rect x="100" y="148" width="72" height="56" rx="10" fill="none" stroke="white" stroke-width="2" opacity="0.3"/>
  <line x1="136" y1="148" x2="136" y2="204" stroke="white" stroke-width="2" opacity="0.3"/>
  <rect x="190" y="148" width="72" height="56" rx="10" fill="#059669" opacity="0.5"/>
  <rect x="190" y="148" width="72" height="56" rx="10" fill="none" stroke="white" stroke-width="2" opacity="0.3"/>
  <line x1="226" y1="148" x2="226" y2="204" stroke="white" stroke-width="2" opacity="0.3"/>
  <!-- Door -->
  <rect x="298" y="175" width="40" height="76" rx="8" fill="#059669" opacity="0.4"/>
  <rect x="298" y="175" width="40" height="76" rx="8" fill="none" stroke="white" stroke-width="2" opacity="0.3"/>
  <circle cx="306" cy="213" r="4" fill="white" opacity="0.7"/>
  <!-- Steps -->
  <rect x="302" y="254" width="32" height="8" rx="2" fill="white" opacity="0.4"/>
  <rect x="306" y="264" width="24" height="8" rx="2" fill="white" opacity="0.3"/>
  <!-- Tow bar -->
  <line x1="360" y1="260" x2="440" y2="260" stroke="white" stroke-width="8" stroke-linecap="round" opacity="0.8"/>
  <circle cx="440" cy="260" r="8" fill="white" opacity="0.6"/>
  <!-- Chimney / vent -->
  <rect x="140" y="118" width="16" height="16" rx="3" fill="white" opacity="0.6"/>
  <!-- Wheels -->
  <circle cx="140" cy="310" r="30" fill="white" opacity="0.9"/>
  <circle cx="140" cy="310" r="18" fill="#059669" opacity="0.8"/>
  <circle cx="140" cy="310" r="6" fill="white" opacity="0.7"/>
  <circle cx="300" cy="310" r="30" fill="white" opacity="0.9"/>
  <circle cx="300" cy="310" r="18" fill="#059669" opacity="0.8"/>
  <circle cx="300" cy="310" r="6" fill="white" opacity="0.7"/>
  <!-- Ground -->
  <line x1="40" y1="340" x2="472" y2="340" stroke="white" stroke-width="3" opacity="0.3"/>
  <!-- Grass tufts -->
  <path d="M60,340 Q65,328 70,340" stroke="white" stroke-width="2" fill="none" opacity="0.2"/>
  <path d="M420,340 Q425,330 430,340" stroke="white" stroke-width="2" fill="none" opacity="0.2"/>
  <path d="M450,340 Q454,332 458,340" stroke="white" stroke-width="2" fill="none" opacity="0.15"/>
  <!-- Text: Park Manager -->
  <text x="256" y="405" font-family="Arial,sans-serif" font-size="52" font-weight="bold" fill="white" text-anchor="middle" letter-spacing="2">PARK MANAGER</text>
  <!-- Text: AI -->
  <text x="256" y="455" font-family="Arial,sans-serif" font-size="38" font-weight="bold" fill="white" text-anchor="middle" opacity="0.7" letter-spacing="8">AI</text>
  <!-- Electric bolt icon (subtle) -->
  <polygon points="248,430 258,430 254,442 262,442 250,460 253,448 246,448" fill="white" opacity="0.5"/>
</svg>
